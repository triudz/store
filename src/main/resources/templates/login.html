<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập Hệ thống - Cửa hàng</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="register-card">
    <h2>Đăng nhập Cửa hàng</h2>

    <div th:if="${error}" class="error-msg-block" th:text="${error}"></div>

    <div th:if="${param.registered}" style="background-color: #d4edda; color: #155724; padding: 12px; border-radius: 6px; margin-bottom: 20px; text-align: center; border: 1px solid #c3e6cb; font-size: 14px;">
         Đăng ký thành công! Vui lòng đăng nhập.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Email của bạn</label>
            <input type="email" class="form-control" name="email" placeholder="VD: email@example.com" required />
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" class="form-control" name="password" placeholder="Nhập mật khẩu..." required />
        </div>

        <button type="submit" class="btn-block-primary">Đăng nhập</button>
    </form>

    <div style="text-align: center; margin-top: 25px; font-size: 15px; color: #6c757d;">
        Bạn chưa có tài khoản?
        <a th:href="@{/register}" style="color: #0366d6; text-decoration: none; font-weight: 600;">Đăng ký tại đây</a>
    </div>
</div>

</body>
</html>
