<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thống kê Doanh thu - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f6; }
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background-color: #343a40; padding: 20px 0; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; color: #28a745; margin-bottom: 20px; font-weight: bold; }
        .sidebar-profile { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #4f5962; margin-bottom: 20px; }
        .sidebar a { color: #c2c7d0; text-decoration: none; padding: 12px 20px; display: block; font-size: 16px; }
        .sidebar a:hover { background-color: #495057; color: white; }
        .sidebar a.active { background-color: #007bff; color: white; }
        .main-content { flex: 1; padding: 30px; }
    </style>
</head>
<body>
<div class="admin-layout">

    <div class="sidebar">
        <h2>Admin Panel</h2>
        <div class="sidebar-profile">
            Xin chào,<br>
            <b><span th:text="${session.loggedInUser != null ? session.loggedInUser.fullName : 'Quản Trị Viên 1'}"></span></b>
        </div>
        <a href="/admin">🏠 Bảng điều khiển</a>
        <a href="/admin/products">📦 Quản lý Sản phẩm</a>
        <a href="/admin/orders">📜 Quản lý Đơn hàng</a>
        <a href="/admin/revenue" class="active">💰 Quản lý Doanh thu</a>
        <a href="#">👥 Quản lý Khách hàng</a>
        <a href="/admin/vouchers">🎫 Quản lý Mã giảm giá</a>
        <a th:href="@{/logout}" style="margin-top: auto; color: #e74c3c;">🚪 Đăng xuất</a>
    </div>

    <div class="main-content">
        <h2 class="text-success mb-4">Báo Cáo Doanh Thu Hệ Thống</h2>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body bg-light rounded">
                <form th:action="@{/admin/revenue}" method="get" class="row g-3 align-items-center">

                    <div class="col-auto">
                        <label for="month" class="col-form-label fw-bold">Tra cứu theo Tháng:</label>
                    </div>
                    <div class="col-auto">
                        <select name="month" id="month" class="form-select form-select-sm">
                            <option th:each="m : ${#numbers.sequence(1, 12)}"
                                    th:value="${m}"
                                    th:text="'Tháng ' + ${m}"
                                    th:selected="${m == selectedMonth}"></option>
                        </select>
                    </div>

                    <div class="col-auto">
                        <label for="year" class="col-form-label fw-bold">Năm:</label>
                    </div>
                    <div class="col-auto">
                        <input type="number" name="year" id="year" class="form-control form-control-sm" th:value="${selectedYear}" style="width: 100px;">
                    </div>

                    <div class="col-auto">
                        <button type="submit" class="btn btn-sm btn-dark px-4">Xem thống kê</button>
                    </div>

                </form>
            </div>
        </div>
        <div class="row mb-4">

            <div class="col-xl-3 col-md-6 mb-3">
                <div class="card text-white bg-success shadow border-0 h-100">
                    <div class="card-header fw-bold text-uppercase small">
                        Doanh Thu Năm <span th:text="${selectedYear}"></span>
                    </div>
                    <div class="card-body">
                        <h4 class="card-title mb-0" th:text="${#numbers.formatDecimal(yearRevenue, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h4>
                    </div>
                </div>
            </div>

            <div class="col-xl-3 col-md-6 mb-3">
                <div class="card text-white bg-info shadow border-0 h-100">
                    <div class="card-header fw-bold text-uppercase small">
                        Số Đơn Năm <span th:text="${selectedYear}"></span>
                    </div>
                    <div class="card-body">
                        <h4 class="card-title mb-0" th:text="${yearOrderCount} + ' Đơn'">0 Đơn</h4>
                    </div>
                </div>
            </div>

            <div class="col-xl-3 col-md-6 mb-3">
                <div class="card text-white bg-primary shadow border-0 h-100">
                    <div class="card-header fw-bold text-uppercase small">
                        Doanh Thu Tháng <span th:text="${selectedMonth}"></span>
                    </div>
                    <div class="card-body">
                        <h4 class="card-title mb-0" th:text="${#numbers.formatDecimal(monthRevenue, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h4>
                    </div>
                </div>
            </div>

            <div class="col-xl-3 col-md-6 mb-3">
                <div class="card text-dark bg-warning shadow border-0 h-100">
                    <div class="card-header fw-bold text-uppercase small">
                        Số Đơn Tháng <span th:text="${selectedMonth}"></span>
                    </div>
                    <div class="card-body">
                        <h4 class="card-title mb-0" th:text="${monthOrderCount} + ' Đơn'">0 Đơn</h4>
                    </div>
                </div>
            </div>

        </div>
            <div class="card-body">
                <div class="row text-center">
                    <div class="col-2 border-end border-bottom py-2" th:each="revenue, iterStat : ${monthlyRevenues}">
                        <div class="text-muted small">Tháng <span th:text="${iterStat.count}"></span></div>
                        <div class="fw-bold text-success" th:text="${#numbers.formatDecimal(revenue, 0, 'COMMA', 0, 'POINT')}">0</div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
