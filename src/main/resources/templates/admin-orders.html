<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản trị Đơn hàng - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="text-danger">Bảng Điều Khiển Admin: Quản Lý Đơn Hàng</h2>
    <hr>
    <div class="row mb-4 mt-3">
        <div class="col-md-4">
            <div class="card text-white bg-success shadow">
                <div class="card-header fw-bold text-uppercase">
                    Tổng Doanh Thu Thực Tế
                </div>
                <div class="card-body">
                    <h3 class="card-title mb-0" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                        0 VNĐ
                    </h3>
                    <p class="card-text small mt-2">(Chỉ tính các đơn hàng đã "Hoàn thành")</p>
                </div>
            </div>
        </div>
    </div>
    <table class="table table-bordered table-hover mt-3">
        <thead class="table-dark">
        <tr>
            <th>Mã đơn</th>
            <th>Mã Khách Hàng</th>
            <th>Ngày đặt</th>
            <th>Tổng tiền</th>
            <th>Trạng thái hiện tại</th>
            <th>Hành động của Admin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>

            <td th:text="'Khách ID: ' + ${order.user.id}"></td>

            <td th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}"></td>
            <td th:text="${order.totalAmount} + ' VNĐ'" class="text-danger fw-bold"></td>

            <td>
                <span th:if="${order.status == 'PENDING'}" class="badge bg-warning text-dark">Chờ duyệt</span>
                <span th:if="${order.status == 'SHIPPING'}" class="badge bg-primary">Đang giao</span>
                <span th:if="${order.status == 'RECEIVED'}" class="badge bg-info text-dark">Khách đã nhận</span>
                <span th:if="${order.status == 'COMPLETED'}" class="badge bg-success">Hoàn thành</span>
            </td>

            <td>
                <form th:action="@{/admin/orders/update}" method="post" class="d-flex">
                    <input type="hidden" name="id" th:value="${order.id}">

                    <select name="status" class="form-select form-select-sm me-2" style="width: 150px;">
                        <option value="PENDING" th:selected="${order.status == 'PENDING'}">Chờ duyệt</option>
                        <option value="SHIPPING" th:selected="${order.status == 'SHIPPING'}">Giao hàng</option>

                        <option value="RECEIVED" th:selected="${order.status == 'RECEIVED'}">Khách đã nhận</option>

                        <option value="COMPLETED" th:selected="${order.status == 'COMPLETED'}">Chốt Hoàn thành</option>
                    </select>

                    <button type="submit" class="btn btn-sm btn-dark">Cập nhật</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
