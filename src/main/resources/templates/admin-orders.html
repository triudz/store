<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản trị Đơn hàng - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f6; }
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background-color: #343a40; padding: 20px 0; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; color: #28a745; margin-bottom: 20px; font-weight: bold; }
        .sidebar-profile { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #4f5962; margin-bottom: 20px; }
        .sidebar a { color: #c2c7d0; text-decoration: none; padding: 12px 20px; display: block; font-size: 16px; }
        .sidebar a:hover { background-color: #495057; color: white; }
        .sidebar a.active { background-color: #007bff; color: white; }
        .main-content { flex: 1; padding: 30px; }
    </style>
</head>
<body>

<div class="admin-layout">

    <div class="sidebar">
        <h2>Admin Panel</h2>

        <div class="sidebar-profile">
            Xin chào,<br>
            <b><span th:text="${session.loggedInUser != null ? session.loggedInUser.fullName : 'Quản Trị Viên 1'}"></span></b>
        </div>

        <a href="/admin">🏠 Bảng điều khiển</a>
        <a href="/admin/products">📦 Quản lý Sản phẩm</a>
        <a href="/admin/orders" class="active">📜 Quản lý Đơn hàng</a>
        <a href="/admin/revenue">💰 Quản lý Doanh thu</a>
        <a href="#">👥 Quản lý Khách hàng</a>
        <a href="/admin/vouchers">🎫 Quản lý Mã giảm giá</a>

        <a th:href="@{/logout}" style="margin-top: auto; color: #e74c3c;">🚪 Đăng xuất</a>
    </div>

    <div class="main-content">
        <h2 class="text-danger mb-4">Bảng Xử Lý và Quản Lý Đơn Hàng</h2>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>Mã đơn</th>
                        <th>Mã Khách Hàng</th>
                        <th>Ngày đặt</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái hiện tại</th>
                        <th>Hành động của Admin</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td class="align-middle fw-bold" th:text="${order.id}"></td>
                        <td class="align-middle" th:text="'Khách ID: ' + ${order.user.id}"></td>
                        <td class="align-middle" th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}"></td>
                        <td class="align-middle text-danger fw-bold" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>

                        <td class="align-middle">
                            <span th:if="${order.status == 'PENDING'}" class="badge bg-warning text-dark px-3 py-2">Chờ duyệt</span>
                            <span th:if="${order.status == 'SHIPPING'}" class="badge bg-primary px-3 py-2">Đang giao</span>
                            <span th:if="${order.status == 'COMPLETED'}" class="badge bg-success px-3 py-2">Hoàn thành</span>
                        </td>

                        <td class="align-middle">
                            <form th:action="@{/admin/orders/update}" method="post" class="d-flex m-0">
                                <input type="hidden" name="id" th:value="${order.id}">
                                <select name="status" class="form-select form-select-sm me-2" style="width: 150px;">
                                    <option value="PENDING" th:selected="${order.status == 'PENDING'}">Chờ duyệt</option>
                                    <option value="SHIPPING" th:selected="${order.status == 'SHIPPING'}">Giao hàng</option>
                                    <option value="COMPLETED" th:selected="${order.status == 'COMPLETED'}">Đã Hoàn thành</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-dark">Cập nhật</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
