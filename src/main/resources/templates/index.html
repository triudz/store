<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạp Hóa Online</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container-large">
    <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e1e4e8; padding-bottom: 10px; margin-bottom: 20px;">
        <h1>🛒 Cửa Hàng Tạp Hóa</h1>
        <div>
            <a th:href="@{/cart}" style="margin-right: 15px; font-weight: bold; color: #ee4d2d;">Giỏ hàng 🛒</a>
            <span th:if="${session.loggedInUser}" th:text="'Chào, ' + ${session.loggedInUser.fullName}"></span>
            <a th:if="${session.loggedInUser}" th:href="@{/logout}" style="margin-left: 10px;">Đăng xuất</a>
            <a th:unless="${session.loggedInUser}" th:href="@{/login}" class="btn-block-primary" style="padding: 8px 15px; width: auto; display: inline-block; text-decoration: none;">Đăng nhập</a>
        </div>
    </header>

    <div th:if="${error}" class="error-msg-block" th:text="${error}"></div>
    <div th:if="${success}" style="background-color: #d4edda; color: #155724; padding: 12px; border-radius: 6px; margin-bottom: 20px; text-align: center; border: 1px solid #c3e6cb;" th:text="${success}"></div>

    <div class="product-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;">
        <div class="product-card" th:each="p : ${products}" style="border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; background: white;">
            <h3 th:text="${p.name}" style="margin-bottom: 5px;"></h3>
            <p style="color: #ee4d2d; font-weight: bold; font-size: 18px; margin-top: 5px;" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></p>

            <p style="font-size: 13px; color: #6c757d; margin-bottom: 15px;">Kho còn: <span th:text="${p.stockQuantity}"></span> chiếc</p>

            <form th:action="@{/cart/add}" method="post">
                <input type="hidden" name="productId" th:value="${p.id}">
                <div style="margin-bottom: 10px;">
                    <label style="font-size: 14px;">SL: </label>
                    <input type="number" name="quantity" value="1" min="1" th:max="${p.stockQuantity}" style="width: 60px; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 4px;">
                </div>
                <button type="submit" class="btn-block-primary">Thêm vào giỏ</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
