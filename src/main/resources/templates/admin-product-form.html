<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f6; }
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background-color: #343a40; padding: 20px 0; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; color: #28a745; margin-bottom: 20px; font-weight: bold; }
        .sidebar-profile { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #4f5962; margin-bottom: 20px; }
        .sidebar a { color: #c2c7d0; text-decoration: none; padding: 12px 20px; display: block; font-size: 16px; }
        .sidebar a:hover { background-color: #495057; color: white; }
        .sidebar a.active { background-color: #007bff; color: white; }
        .main-content { flex: 1; padding: 30px; }
    </style>
</head>
<body>

<div class="admin-layout">
    <div class="sidebar">
        <h2>Admin Panel</h2>
        <div class="sidebar-profile">
            Xin chào,<br>
            <b><span th:text="${session.loggedInUser != null ? session.loggedInUser.fullName : 'Admin'}"></span></b>
        </div>
        <a href="/admin">🏠 Bảng điều khiển</a>
        <a href="/admin/products" class="active">📦 Quản lý Sản phẩm</a>
        <a href="/admin/orders">📜 Quản lý Đơn hàng</a>
        <a href="/admin/revenue">💰 Quản lý Doanh thu</a>
        <a href="#">👥 Quản lý Khách hàng</a>
        <a href="/admin/vouchers">🎫 Quản lý Mã giảm giá</a>
        <a th:href="@{/logout}" style="margin-top: auto; color: #e74c3c;">🚪 Đăng xuất</a>
    </div>

    <div class="main-content">
        <div class="card shadow" style="max-width: 800px; margin: 0 auto;">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0" th:text="${title}"></h4>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Danh mục sản phẩm</label>
                        <select class="form-select" th:field="*{category}" required>
                            <option value="">-- Chọn danh mục --</option>
                            <option th:each="cat : ${categories}" 
                                 th:value="${cat.id}" 
                             th:text="${cat.name}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên sản phẩm</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Giá bán (VNĐ)</label>
                            <input type="number" class="form-control" th:field="*{price}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Số lượng trong kho</label>
                            <input type="number" class="form-control" th:field="*{stockQuantity}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Đường dẫn Hình ảnh (Image URL)</label>
                        <input type="text" class="form-control" th:field="*{imageUrl}" placeholder="Dán link ảnh (http://...) vào đây">
                        <small class="text-muted">Lên Google Gõ tìm ảnh -> Chuột phải vào ảnh -> Chọn "Sao chép địa chỉ hình ảnh" -> Dán vào đây.</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Mô tả sản phẩm</label>
                        <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="/admin/products" class="btn btn-secondary px-4">Hủy</a>
                        <button type="submit" class="btn btn-success px-5">Lưu Thông Tin</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
