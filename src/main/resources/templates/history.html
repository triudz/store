<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Lịch sử mua hàng của bạn</h2>

    <table class="table table-bordered mt-3">
        <thead class="table-dark">
        <tr>
            <th>Mã đơn</th>
            <th>Ngày đặt</th>
            <th>Tổng tiền</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}"></td>
            <td th:text="${order.totalAmount} + ' VNĐ'"></td>

            <td>
                <span th:if="${order.status == 'PENDING'}" class="badge bg-warning text-dark">Chờ duyệt</span>
                <span th:if="${order.status == 'SHIPPING'}" class="badge bg-primary">Đang giao</span>
                <span th:if="${order.status == 'COMPLETED'}" class="badge bg-success">Đã Hoàn thành</span>
            </td>

            <td>
                <form th:if="${order.status == 'SHIPPING'}"
                      th:action="@{/history/confirm/{id}(id=${order.id})}" method="post">
                    <button type="submit" class="btn btn-sm btn-success">Tôi đã nhận được hàng</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
